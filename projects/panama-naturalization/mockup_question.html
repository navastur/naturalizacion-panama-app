<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Pregunta - Naturalización Panamá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .app-container { max-width: 375px; margin: 0 auto; background: white; min-height: 100vh; position: relative; }
        .header { background: white; padding: 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .option { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 2px solid #e5e7eb; font-size: 14px; font-weight: 500; cursor: pointer; }
        .option:active { transform: scale(0.98); }
        .option.selected { border-color: #3b82f6; background-color: #eff6ff; }
        .status-dot { width: 15px; height: 15px; border-radius: 50%; display: inline-block; }
        .dot-green { background-color: #10b981; box-shadow: 0 0 5px #10b981; }
        .dot-yellow { background-color: #f59e0b; box-shadow: 0 0 5px #f59e0b; }
        .dot-red { background-color: #ef4444; box-shadow: 0 0 5px #ef4444; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <a href="#"><i class="fa-solid fa-xmark text-gray-400"></i></a>
        <div class="flex-1 px-4">
            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                <div class="bg-blue-600 h-2 w-1/3"></div>
            </div>
        </div>
        <div class="flex items-center gap-1">
            <i class="fa-solid fa-heart text-red-500"></i>
            <span class="text-sm font-bold">5</span>
        </div>
    </div>
    <div class="p-6">
        <div class="flex justify-between items-center mb-4">
            <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Historia · 5/20</span>
            <div class="flex gap-2">
                <div class="status-dot dot-green opacity-30"></div>
                <div class="status-dot dot-yellow"></div>
                <div class="status-dot dot-red opacity-30"></div>
            </div>
        </div>
        <h2 class="text-lg font-bold text-gray-800 leading-tight mb-8">¿En qué fecha se separó Panamá de Colombia?</h2>
        <div class="options">
            <div class="option">28 de noviembre de 1821</div>
            <div class="option selected">3 de noviembre de 1903</div>
            <div class="option">15 de agosto de 1914</div>
            <div class="option">10 de noviembre de 1821</div>
        </div>
        <button class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl mt-6 shadow-lg active:scale-95 transition-transform uppercase tracking-wider text-sm">Comprobar</button>
        <p class="text-[10px] text-center text-gray-400 mt-4">¡Acierta esta vez para pasar a estado <span class="text-green-600 font-bold uppercase tracking-widest">Dominada</span>!</p>
    </div>
</div>
</body>
</html>
