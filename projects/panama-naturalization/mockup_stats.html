<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Estadísticas - Naturalización Panamá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .app-container { max-width: 375px; margin: 0 auto; background: white; min-height: 100vh; position: relative; }
        .header { background: #1e3a8a; color: white; padding: 20px; border-bottom-right-radius: 20px; border-bottom-left-radius: 20px; }
        .stat-card { background: white; border-radius: 15px; padding: 15px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .traffic-light { width: 10px; height: 10px; border-radius: 50%; }
        .light-red { background-color: #ef4444; }
        .light-yellow { background-color: #f59e0b; }
        .light-green { background-color: #10b981; }
    </style>
</head>
<body>
<div class="app-container pb-20">
    <div class="header flex justify-between items-center">
        <h1 class="text-lg font-bold">Tu Rendimiento</h1>
        <div class="bg-white/20 p-2 rounded-full"><i class="fa-solid fa-share-nodes"></i></div>
    </div>
    <div class="p-6">
        <!-- Semáforo Global -->
        <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Estado del Banco de Preguntas</h2>
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="stat-card flex flex-col items-center">
                <div class="traffic-light light-green mb-2 shadow-[0_0_8px_#10b981]"></div>
                <span class="text-2xl font-black text-green-600">12</span>
                <span class="text-[8px] font-bold text-gray-400 uppercase">Dominadas</span>
            </div>
            <div class="stat-card flex flex-col items-center">
                <div class="traffic-light light-yellow mb-2 shadow-[0_0_8px_#f59e0b]"></div>
                <span class="text-2xl font-black text-yellow-500">18</span>
                <span class="text-[8px] font-bold text-gray-400 uppercase">En Aprendizaje</span>
            </div>
            <div class="stat-card flex flex-col items-center">
                <div class="traffic-light light-red mb-2 shadow-[0_0_8px_#ef4444]"></div>
                <span class="text-2xl font-black text-red-500">20</span>
                <span class="text-[8px] font-bold text-gray-400 uppercase">Por Iniciar</span>
            </div>
        </div>
        <!-- Temas Críticos -->
        <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Temas que Necesitan Refuerzo</h2>
        <div class="space-y-3">
            <div class="stat-card flex items-center justify-between border-l-4 border-l-red-500">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-scale-balanced text-red-500"></i>
                    <div>
                        <h4 class="text-xs font-bold">Órganos del Estado</h4>
                        <p class="text-[10px] text-gray-500">80% errores en "Poder Judicial"</p>
                    </div>
                </div>
                <button class="bg-red-500 text-white text-[9px] font-black px-2 py-1 rounded-full uppercase">Reforzar</button>
            </div>
            <div class="stat-card flex items-center justify-between border-l-4 border-l-yellow-500">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-map text-yellow-500"></i>
                    <div>
                        <h4 class="text-xs font-bold">Geografía: Comarcas</h4>
                        <p class="text-[10px] text-gray-500">Mejorando poco a poco</p>
                    </div>
                </div>
                <button class="bg-yellow-500 text-white text-[9px] font-black px-2 py-1 rounded-full uppercase">Estudiar</button>
            </div>
        </div>
        <!-- XP Chart Placeholder -->
        <div class="stat-card mt-8 flex flex-col items-center justify-center p-10 border-dashed">
            <i class="fa-solid fa-chart-simple text-4xl text-gray-200 mb-2"></i>
            <p class="text-xs font-bold text-gray-300 uppercase tracking-tighter italic">Gráfico de actividad semanal</p>
        </div>
    </div>
</div>
</body>
</html>
