<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Podcast - Naturalización Panamá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1e3a8a; font-family: 'Inter', sans-serif; }
        .app-container { max-width: 375px; margin: 0 auto; background: linear-gradient(to bottom, #1e3a8a, #3b82f6); min-height: 100vh; position: relative; color: white; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .cover { width: 280px; height: 280px; border-radius: 20px; margin: 40px auto; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow: hidden; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 50px; }
        .play-btn { width: 70px; height: 70px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #1e3a8a; font-size: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; margin-top: 40px; position: relative; }
        .progress-fill { width: 35%; height: 100%; background: white; border-radius: 2px; position: relative; }
        .progress-fill::after { content: ''; position: absolute; right: -6px; top: -4px; width: 12px; height: 12px; background: white; border-radius: 50%; }
    </style>
</head>
<body>
<div class="app-container p-6">
    <div class="header">
        <a href="#"><i class="fa-solid fa-chevron-down"></i></a>
        <span class="text-xs font-bold uppercase tracking-widest opacity-70">Mini-Podcast</span>
        <a href="#"><i class="fa-solid fa-share-nodes"></i></a>
    </div>
    <div class="cover">
        <div class="text-[#1e3a8a] text-center">
            <i class="fa-solid fa-microphone-lines text-6xl mb-4"></i>
            <h3 class="font-black text-2xl uppercase tracking-tighter">HISTORIA</h3>
        </div>
    </div>
    <div class="mt-8 text-center">
        <h2 class="text-2xl font-bold mb-1">Época Departamental</h2>
        <p class="text-sm opacity-70">Lección 2: La Unión a Colombia</p>
    </div>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    <div class="flex justify-between text-[10px] mt-2 opacity-50">
        <span>02:15</span>
        <span>06:45</span>
    </div>
    <div class="controls">
        <i class="fa-solid fa-backward-step text-2xl opacity-70"></i>
        <i class="fa-solid fa-rotate-left text-xl opacity-70"></i>
        <div class="play-btn active:scale-90 transition-transform">
            <i class="fa-solid fa-pause"></i>
        </div>
        <i class="fa-solid fa-rotate-right text-xl opacity-70"></i>
        <i class="fa-solid fa-forward-step text-2xl opacity-70"></i>
    </div>
    <div class="mt-12 flex justify-center gap-10 opacity-60">
        <i class="fa-solid fa-gauge-high"></i>
        <span class="text-xs font-bold">1.25x</span>
        <i class="fa-solid fa-list-ul"></i>
    </div>
</div>
</body>
</html>
