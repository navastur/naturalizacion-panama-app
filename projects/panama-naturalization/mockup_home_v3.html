<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Home v3 - Naturalización Panamá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .app-container { max-width: 375px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: white; padding: 25px 20px; border-bottom-right-radius: 30px; border-bottom-left-radius: 30px; }
        .card { background: white; border-radius: 15px; padding: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; border: 1px solid #e5e7eb; position: relative; }
        .card:active { transform: scale(0.98); }
        .icon-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .nav-bar { position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; background: white; border-top: 1px solid #e5e7eb; }
        .streak-badge { background: #fff7ed; color: #ea580c; border: 1px solid #ffedd5; padding: 2px 8px; border-radius: 20px; font-weight: bold; font-size: 0.7rem; display: flex; align-items: center; gap: 3px; }
    </style>
</head>
<body>

<div class="app-container overflow-hidden pb-24">
    <!-- Header -->
    <div class="header">
        <div class="flex justify-between items-start mb-4">
            <div>
                <div class="flex items-center gap-2 mb-1">
                   <h1 class="text-lg font-bold">¡Hola, Luis!</h1>
                   <span class="bg-yellow-400 text-blue-900 px-1.5 py-0.5 rounded text-[9px] font-black uppercase">LVL 12</span>
                </div>
                <p class="text-blue-100 text-[10px]">Tu camino a la ciudadanía</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <div class="streak-badge">
                    <i class="fa-solid fa-fire"></i>
                    <span>7 Días</span>
                </div>
            </div>
        </div>
        
        <!-- XP Progress Card -->
        <div class="bg-white text-gray-800 p-3 rounded-2xl shadow-lg">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-wide">XP: 2,450 / 3,000</span>
                <span class="text-blue-600 font-black text-xs">35%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="bg-blue-600 h-2 rounded-full" style="width: 35%"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="p-4">
        <h2 class="text-md font-bold mb-3 text-gray-800 uppercase text-xs tracking-wider">Módulos Principales</h2>
        
        <!-- Action Cards Grid (Now with Podcasts) -->
        <div class="grid grid-cols-2 gap-3">
            <!-- Simulacro -->
            <div class="card flex flex-col items-center">
                <div class="icon-circle bg-red-100 text-red-600">
                    <i class="fa-solid fa-file-lines fa-lg"></i>
                </div>
                <span class="text-[11px] font-bold text-center">Simulacro</span>
            </div>
            
            <!-- Módulos de Estudio -->
            <div class="card flex flex-col items-center">
                <div class="icon-circle bg-blue-100 text-blue-600">
                    <i class="fa-solid fa-book-open fa-lg"></i>
                </div>
                <span class="text-[11px] font-bold text-center">Lecciones</span>
            </div>

            <!-- Vídeos de Estudio -->
            <div class="card flex flex-col items-center">
                <div class="icon-circle bg-green-100 text-green-600">
                    <i class="fa-solid fa-play fa-lg"></i>
                </div>
                <span class="text-[11px] font-bold text-center">Vídeos</span>
            </div>

            <!-- Mini-Podcasts (New Section) -->
            <div class="card flex flex-col items-center border-2 border-blue-400 shadow-md">
                <div class="icon-circle bg-blue-600 text-white">
                    <i class="fa-solid fa-microphone-lines fa-lg"></i>
                </div>
                <span class="text-[11px] font-bold text-center">Mini-Podcasts</span>
                <span class="absolute -top-2 -right-1 bg-blue-600 text-[7px] px-1.5 py-0.5 rounded-full font-bold text-white uppercase shadow-sm">Audio</span>
            </div>

            <!-- Flashcards -->
            <div class="card flex flex-col items-center">
                <div class="icon-circle bg-yellow-100 text-yellow-600">
                    <i class="fa-solid fa-bolt fa-lg"></i>
                </div>
                <span class="text-[11px] font-bold text-center">Flashcards</span>
            </div>

            <!-- Guía de Trámites -->
            <div class="card flex flex-col items-center">
                <div class="icon-circle bg-purple-100 text-purple-600">
                    <i class="fa-solid fa-info-circle fa-lg"></i>
                </div>
                <span class="text-[11px] font-bold text-center">Guía Legal</span>
            </div>
        </div>

        <!-- Continue Shortcut -->
        <div class="mt-5 p-3 bg-blue-50 border border-blue-100 rounded-xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white text-xs">
                    <i class="fa-solid fa-headphones-simple"></i>
                </div>
                <div>
                    <p class="text-[9px] text-blue-600 font-bold uppercase tracking-wider">Escuchar Siguiente (+15 XP)</p>
                    <p class="text-xs font-bold text-gray-800">Podcast: Época Departamental</p>
                </div>
            </div>
            <i class="fa-solid fa-play text-blue-600 text-sm"></i>
        </div>
    </div>

    <!-- Navigation Bar -->
    <div class="nav-bar">
        <div class="text-blue-600 text-center">
            <i class="fa-solid fa-house text-sm"></i>
            <p class="text-[9px] font-bold">Inicio</p>
        </div>
        <div class="text-gray-400 text-center">
            <i class="fa-solid fa-fire text-sm text-orange-400"></i>
            <p class="text-[9px]">Racha</p>
        </div>
        <div class="text-gray-400 text-center relative">
            <i class="fa-solid fa-trophy text-sm"></i>
            <p class="text-[9px]">Logros</p>
        </div>
        <div class="text-gray-400 text-center">
            <i class="fa-solid fa-user text-sm"></i>
            <p class="text-[9px]">Perfil</p>
        </div>
    </div>
</div>

</body>
</html>
