<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Perfil - Naturalización Panamá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .app-container { max-width: 375px; margin: 0 auto; background: white; min-height: 100vh; position: relative; }
        .profile-header { background: #f8fafc; padding: 40px 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: #3b82f6; color: white; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 15px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .setting-item { display: flex; items-center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="profile-header">
        <div class="avatar font-black">LN</div>
        <h2 class="text-lg font-bold text-gray-800">Luis Navarrete</h2>
        <p class="text-xs text-gray-500 font-medium">Nivel 12 · Patriota en Formación</p>
        <div class="flex justify-center gap-4 mt-4">
            <div class="bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100 flex items-center gap-2">
                <i class="fa-solid fa-fire text-orange-500 text-xs"></i>
                <span class="text-[10px] font-bold">7 Días</span>
            </div>
            <div class="bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100 flex items-center gap-2">
                <i class="fa-solid fa-trophy text-yellow-500 text-xs"></i>
                <span class="text-[10px] font-bold">12 Logros</span>
            </div>
        </div>
    </div>
    <div class="mt-4">
        <h3 class="px-6 py-2 text-[10px] font-black text-gray-400 uppercase tracking-widest">Configuración</h3>
        <div class="setting-item">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-bell text-blue-500"></i>
                <span class="text-sm font-medium">Notificaciones Diarias</span>
            </div>
            <div class="w-10 h-5 bg-blue-600 rounded-full relative"><div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div></div>
        </div>
        <div class="setting-item">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-moon text-gray-400"></i>
                <span class="text-sm font-medium">Modo Oscuro</span>
            </div>
            <div class="w-10 h-5 bg-gray-200 rounded-full relative"><div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full"></div></div>
        </div>
        <div class="setting-item">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-language text-green-500"></i>
                <span class="text-sm font-medium">Idioma de la App</span>
            </div>
            <span class="text-xs text-gray-400">Español <i class="fa-solid fa-chevron-right ml-1"></i></span>
        </div>
        
        <h3 class="px-6 py-2 mt-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Cuenta</h3>
        <div class="setting-item">
            <span class="text-sm font-medium">Cerrar Sesión</span>
            <i class="fa-solid fa-arrow-right-from-bracket text-gray-300"></i>
        </div>
        <div class="setting-item">
            <span class="text-sm font-medium text-red-500">Eliminar Cuenta</span>
        </div>
    </div>
</div>
</body>
</html>
