<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Flashcards - Naturalización Panamá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .app-container { max-width: 375px; margin: 0 auto; background: #eff6ff; min-height: 100vh; display: flex; flex-direction: column; }
        .flashcard { flex: 1; margin: 40px 20px; background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; position: relative; perspective: 1000px; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-btn { background: #3b82f6; color: white; padding: 12px 30px; border-radius: 30px; font-weight: bold; margin-bottom: 40px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="p-6 flex justify-between items-center">
        <i class="fa-solid fa-xmark text-blue-400"></i>
        <div class="text-xs font-black text-blue-600 uppercase tracking-widest">Símbolos Patrios · 3/15</div>
        <i class="fa-solid fa-gear text-blue-400"></i>
    </div>
    <div class="flashcard">
        <span class="text-[10px] font-bold text-gray-300 uppercase mb-4 tracking-tighter">Pregunta</span>
        <h2 class="text-2xl font-black text-gray-800 leading-tight">¿Quién diseñó el Escudo Nacional de Panamá?</h2>
        <div class="mt-10 opacity-20">
            <i class="fa-solid fa-arrows-rotate text-4xl"></i>
        </div>
    </div>
    <div class="flex flex-col items-center">
        <button class="flip-btn shadow-lg active:scale-95 transition-transform uppercase tracking-widest text-xs">Ver Respuesta</button>
        <div class="flex gap-4 mb-10">
            <button class="w-14 h-14 rounded-full bg-white border-2 border-red-100 text-red-500 shadow-sm flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
            <button class="w-14 h-14 rounded-full bg-white border-2 border-green-100 text-green-500 shadow-sm flex items-center justify-center"><i class="fa-solid fa-check"></i></button>
        </div>
    </div>
</div>
</body>
</html>
