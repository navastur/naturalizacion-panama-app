<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Módulos - Naturalización Panamá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .app-container { max-width: 375px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { background: #1e3a8a; color: white; padding: 20px; border-bottom-right-radius: 20px; border-bottom-left-radius: 20px; }
        .module-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #e5e7eb; display: flex; align-items: center; gap: 15px; }
        .module-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .progress-circle { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; position: relative; }
        .progress-fill { position: absolute; top: -3px; left: -3px; width: 40px; height: 40px; border-radius: 50%; border: 3px solid #10b981; clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, 50% 0%); }
    </style>
</head>
<body>
<div class="app-container pb-20">
    <div class="header flex items-center gap-4">
        <a href="#"><i class="fa-solid fa-chevron-left"></i></a>
        <h1 class="text-lg font-bold">Módulos de Estudio</h1>
    </div>
    <div class="p-4">
        <!-- Historia -->
        <div class="module-card">
            <div class="module-icon bg-blue-100 text-blue-600"><i class="fa-solid fa-monument"></i></div>
            <div class="flex-1">
                <h3 class="font-bold text-sm">Historia de Panamá</h3>
                <p class="text-[10px] text-gray-500">12 temas · 45 preguntas</p>
            </div>
            <div class="progress-circle text-green-600">65%<div class="progress-fill" style="clip-path: inset(0 0 0 35%)"></div></div>
        </div>
        <!-- Geografía -->
        <div class="module-card">
            <div class="module-icon bg-green-100 text-green-600"><i class="fa-solid fa-map-location-dot"></i></div>
            <div class="flex-1">
                <h3 class="font-bold text-sm">Geografía Nacional</h3>
                <p class="text-[10px] text-gray-500">8 temas · 30 preguntas</p>
            </div>
            <div class="progress-circle text-gray-400">12%</div>
        </div>
        <!-- Cívica -->
        <div class="module-card border-l-4 border-l-yellow-400">
            <div class="module-icon bg-yellow-100 text-yellow-600"><i class="fa-solid fa-scale-balanced"></i></div>
            <div class="flex-1">
                <h3 class="font-bold text-sm">Educación Cívica</h3>
                <p class="text-[10px] text-yellow-600 font-bold">Punto Débil: Necesita refuerzo</p>
            </div>
            <div class="progress-circle text-red-600">5%</div>
        </div>
        <!-- Cultura -->
        <div class="module-card">
            <div class="module-icon bg-purple-100 text-purple-600"><i class="fa-solid fa-masks-theater"></i></div>
            <div class="flex-1">
                <h3 class="font-bold text-sm">Cultura y Tradiciones</h3>
                <p class="text-[10px] text-gray-500">5 temas · 15 preguntas</p>
            </div>
            <div class="progress-circle text-gray-400">0%</div>
        </div>
    </div>
</div>
</body>
</html>
